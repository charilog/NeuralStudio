<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#141828"/>
      <stop offset="100%" stop-color="#090C16"/>
    </linearGradient>
    <!-- Node gradient: teal glow -->
    <radialGradient id="node_in" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#5EFFC4"/>
      <stop offset="60%"  stop-color="#1D9E75"/>
      <stop offset="100%" stop-color="#0A5C43"/>
    </radialGradient>
    <radialGradient id="node_hid" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#6BFFE8"/>
      <stop offset="60%"  stop-color="#22B8A0"/>
      <stop offset="100%" stop-color="#0D7060"/>
    </radialGradient>
    <radialGradient id="node_out" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#4EDDAD"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </radialGradient>
    <!-- Soft drop shadow -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#1D9E75" flood-opacity="0.5"/>
    </filter>
    <!-- Glow for output -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ────────────────────────────────────────────────────── -->
  <rect width="256" height="256" rx="42" ry="42" fill="url(#bg)"/>

  <!-- Very subtle radial glow behind nodes -->
  <ellipse cx="128" cy="118" rx="100" ry="80" fill="#1D9E75" opacity="0.06"/>

  <!-- ── Layout ─────────────────────────────────────────────────────────
       Input  x=54   y: 54, 98, 142, 186
       Hidden x=128  y: 72, 124, 176
       Output x=202  y: 92, 156
  ─────────────────────────────────────────────────────────────────────── -->

  <!-- ── Connection lines: input → hidden (4×3=12) ──────────────────── -->
  <g stroke="#1D9E75" stroke-width="1.4" opacity="0.38">
    <line x1="54" y1="54"  x2="128" y2="72"/>
    <line x1="54" y1="54"  x2="128" y2="124"/>
    <line x1="54" y1="54"  x2="128" y2="176"/>
    <line x1="54" y1="98"  x2="128" y2="72"/>
    <line x1="54" y1="98"  x2="128" y2="124"/>
    <line x1="54" y1="98"  x2="128" y2="176"/>
    <line x1="54" y1="142" x2="128" y2="72"/>
    <line x1="54" y1="142" x2="128" y2="124"/>
    <line x1="54" y1="142" x2="128" y2="176"/>
    <line x1="54" y1="186" x2="128" y2="72"/>
    <line x1="54" y1="186" x2="128" y2="124"/>
    <line x1="54" y1="186" x2="128" y2="176"/>
  </g>

  <!-- ── Connection lines: hidden → output (3×2=6), stronger ────────── -->
  <g stroke="#1D9E75" stroke-width="2" opacity="0.6">
    <line x1="128" y1="72"  x2="202" y2="92"/>
    <line x1="128" y1="72"  x2="202" y2="156"/>
    <line x1="128" y1="124" x2="202" y2="92"/>
    <line x1="128" y1="124" x2="202" y2="156"/>
    <line x1="128" y1="176" x2="202" y2="92"/>
    <line x1="128" y1="176" x2="202" y2="156"/>
  </g>

  <!-- ── Input nodes (r=11) ─────────────────────────────────────────── -->
  <g fill="url(#node_in)">
    <circle cx="54" cy="54"  r="11" filter="url(#shadow)"/>
    <circle cx="54" cy="98"  r="11" filter="url(#shadow)"/>
    <circle cx="54" cy="142" r="11" filter="url(#shadow)"/>
    <circle cx="54" cy="186" r="11" filter="url(#shadow)"/>
  </g>
  <!-- Input node inner dots -->
  <g fill="white" opacity="0.9">
    <circle cx="54" cy="54"  r="4"/>
    <circle cx="54" cy="98"  r="4"/>
    <circle cx="54" cy="142" r="4"/>
    <circle cx="54" cy="186" r="4"/>
  </g>

  <!-- ── Hidden nodes (r=13) ───────────────────────────────────────── -->
  <g fill="url(#node_hid)">
    <circle cx="128" cy="72"  r="13" filter="url(#shadow)"/>
    <circle cx="128" cy="124" r="13" filter="url(#shadow)"/>
    <circle cx="128" cy="176" r="13" filter="url(#shadow)"/>
  </g>
  <g fill="white" opacity="0.9">
    <circle cx="128" cy="72"  r="4.5"/>
    <circle cx="128" cy="124" r="4.5"/>
    <circle cx="128" cy="176" r="4.5"/>
  </g>

  <!-- ── Output nodes (r=16, glowing) ─────────────────────────────── -->
  <g fill="url(#node_out)" filter="url(#glow)">
    <circle cx="202" cy="92"  r="16"/>
    <circle cx="202" cy="156" r="16"/>
  </g>
  <g fill="white">
    <circle cx="202" cy="92"  r="5.5"/>
    <circle cx="202" cy="156" r="5.5"/>
  </g>

  <!-- ── "NS" label ─────────────────────────────────────────────────── -->
  <text x="128" y="234"
        text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="3"
        fill="#1D9E75"
        opacity="0.92">NS</text>
</svg>
